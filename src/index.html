<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Image Placer</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="topBar">
      <button class="buttonTop" onclick="window.close()">X</button>
    </div>
    <div class="mainWindow">
      <h1 style="text-align: center; font-size: x-large;">🖼️ Place Images around your screen!</h1>
      <p style="margin-left: 16px;">Just paste the image url and enjoy <br><br>press the ~ key on your keyboard to close the current image</p>
      <div style="position: relative; margin-left: 10%;display: grid; grid-template-columns: 50% 50%;">
        <input style="margin: 0px; height: 100%;" type="url" placeholder="https://imagewebsite.com/image.gif" id="imageURL"></input>
        <button style="margin: 0px; height: 100%;" id="fileButton">Load File</button>
      </div>
      <button id="hitButton">✨DISPLAY✨</button>
    </div>
    <script src="src/main.js"></script>
  </body>
</html>
